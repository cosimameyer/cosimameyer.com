    lineNos: false
    lineNumbersInTable: true
    noClasses: false
    noHl: false
    style: monokailight
    tabWidth: 4
taxonomies:
  category: category
  tag: tags
outputs:
  home: ["HTML", "RSS", "JSON", "WebAppManifest"]
  section: [ "HTML", "RSS" ]
  taxonomy: [ "HTML", "RSS" ]
  taxonomyTerm: [ "HTML", "RSS" ]
ignoreErrors: ["error-remote-getjson"]