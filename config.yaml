params:
  description: "Senior Data Scientist at SAP, conference speaker, and community builder in the R and Python ecosystem. I speak on explainable ML, NLP, open-source development, and inclusion in tech."
  blogPageURL: post
  contactLink: contact
  copyright: All rights reserved © Cosima Meyer 2026
  footerLogo: images/contact/widget-logo.png
