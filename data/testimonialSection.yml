  - name: R-Ladies Tunis
    thumbnail: images/talks/nlp-rladies-tunis.png
    title: Getting the most out of text - Using supervised and unsupervised approaches in NLP
    # comment: Text data provides an oasis of information for both researchers and non-researchers alike to explore. Natural Language Processing (NLP) methods help make sense of this difficult data type. The talk and code give you a smooth introduction to the [quanteda package](https://quanteda.io/). I will also showcase how to quickly visualize your text data and cover both supervised and unsupervised approaches in NLP. As part of the code demo, we will use text [data from the UN](https://doi.org/10.7910/DVN/0TJX8Y) as a working example to give you first insights into the structure of text data and how to work with it. If you want to see the code that we are using during the workshop in action, it's also deployed [here](https://nlp-tunis.netlify.app).
    time: January 30, 2021
    github: https://github.com/cosimameyer/nlp-rladies-tunis
    slides: /slides/nlp-rladies-tunis/talk.html#1
    recording: https://www.youtube.com/watch?v=NYuTFy_JRLA
