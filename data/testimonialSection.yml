  - name: CorrelCon 2020
    thumbnail: images/talks/correlcon-2020.png
    title: Talking Shiny - Creating interactive and accessible dashboards in R
    # comment: Research produces fascinating findings. But it is often difficult to present them to a broader audience beyond the research paper. Shiny apps offer researchers (both in academia and business) sophisticated tools to generate web applications that make the results accessible, understandable, and interactive. The talk will guide you through the necessary steps to set up your own ShinyApp and discuss lessons learned from building a ShinyApp using Shiny for R, shinydashboards, and echarts4r.
    time: November 7, 2020
