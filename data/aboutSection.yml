bio: >
  My path into data science ran through political science — wanting to understand
  how the world works, and finding that code, data, and models could help. That
  curiosity became a career building methods and tools, speaking at conferences,
  and making the technical side of data science more approachable for
  practitioners at every level. I currently work as an AI Program Manager, Lead of the Data Science Community,
  and Senior Data Scientist at SAP.


  Community and inclusion have been central to that work from the start: founding
  communities, contributing to global diversity networks, and creating spaces
  where more people feel at home in tech.
