name: Deploy website

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".git/**"
      - "public/**"
      - "node_modules/**"
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      heavy_assets: ${{ steps.filter.outputs.heavy_assets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^static/(slides|images)/'; then
            echo "heavy_assets=true" >> "$GITHUB_OUTPUT"
          else
            echo "heavy_assets=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-site:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.143.1'
          extended: true

      - name: Build Hugo Site
        env:
          HUGO_ENV: production
        run: hugo --minify

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Sync site files
        timeout-minutes: 10
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          printf 'set ftp:ssl-force yes\nset ssl:verify-certificate no\n' > ~/.lftprc
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" \
            -e "mirror --reverse --delete --parallel=4 --exclude-glob=slides/ --exclude-glob=images/ ./public/ /web/cosimameyer.com/; bye" \
            ftp://"$FTP_SERVER"

  sync-heavy-assets:
    needs: detect-changes
    if: needs.detect-changes.outputs.heavy_assets == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-heavy-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.143.1'
          extended: true

      - name: Build Hugo Site
        env:
          HUGO_ENV: production
        run: hugo --minify

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Sync slides and images
        timeout-minutes: 30
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          printf 'set ftp:ssl-force yes\nset ssl:verify-certificate no\n' > ~/.lftprc
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" \
            -e "mirror --reverse --delete --parallel=4 ./public/slides/ /web/cosimameyer.com/slides/; mirror --reverse --delete --parallel=4 ./public/images/ /web/cosimameyer.com/images/; bye" \
            ftp://"$FTP_SERVER"
