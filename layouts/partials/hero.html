<script src="https://cdn.jsdelivr.net/npm/typeit@7.0.4/dist/typeit.min.js"></script>

{{ with .Site.Data.hero }}
{{ if .enable }}
<section class="hero" id="home">
  <div class="hero-split">

    <!-- ========== Left: text ========== -->
    <div class="hero-left">
      <p class="hero-pretitle">Data Scientist &amp; Conference Speaker</p>

      <h1 class="hero-name">
        <span class="hero-name-accent">Cosima</span><br>
        <span class="hero-name-main">Meyer</span>
      </h1>

      <p class="hero-tagline"><span class="multipleStrings"></span>&nbsp;</p>

      <div class="hero-social">
        <a href="{{ .mail }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="Email">
          <i class="fa fa-envelope"></i>
        </a>
        <a href="{{ .github }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="fa fa-github"></i>
        </a>
        <a href="{{ .linkedin }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="fa fa-linkedin"></i>
        </a>
        <a href="{{ .orcid }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="ORCID">
          <i class="fa fa-book"></i>
        </a>
      </div>
    </div>

    <!-- ========== Right: photo ========== -->
    <div class="hero-right">
      <div class="hero-circle"></div>
      <img class="hero-photo"
           src="{{ .image | absURL }}"
           alt="Cosima Meyer" />
    </div>

  </div>
</section>
{{ end }}
{{ end }}

<script>
  new TypeIt(".multipleStrings", {
    strings: [
      "I speak at conferences worldwide.",
      "I build open-source tools for R and Python.",
      "I make machine learning approachable.",
      "I work at the intersection of data and community."
    ],
    breakLines: false,
    loop: true,
    speed: 50,
    deleteSpeed: 30,
    waitBeforeDelete: 2200
  }).go();
</script>
