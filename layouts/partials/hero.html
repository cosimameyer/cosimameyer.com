{{ with .Site.Data.hero }}
{{ if .enable }}
<section class="hero" id="home">
  <div class="hero-split">

    <!-- ========== Left: text ========== -->
    <div class="hero-left">
      <p class="hero-pretitle">Data Scientist &amp; Conference Speaker</p>

      <h1 class="hero-name">
        <span class="hero-name-accent">Cosima</span><br>
        <span class="hero-name-main">Meyer</span>
      </h1>

      <!-- CSS-animated phrase rotator — no JS library -->
      <div class="hero-tagline">
        <div class="rotating-text">
          <span>I speak at conferences worldwide.</span>
          <span>I build open-source tools for R and Python.</span>
          <span>I make machine learning approachable.</span>
          <span>I work at the intersection of data and community.</span>
        </div>
      </div>

      <div class="hero-social">
        <a href="{{ .mail }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="Email">
          <i class="fa-solid fa-envelope"></i>
        </a>
        <a href="{{ .linkedin }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>
        <a href="{{ .github }}" class="hero-social-btn" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>

    <!-- ========== Right: photo ========== -->
    <div class="hero-right">
      <div class="hero-circle"></div>
      <img class="hero-photo"
           src="{{ .image | absURL }}"
           alt="Cosima Meyer" />
    </div>

  </div>
</section>
{{ end }}
{{ end }}
