<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">

    <a href="{{ .Site.BaseURL }}" class="navbar-brand nav-wordmark">
      <span class="wordmark-first">Cosima</span> <span class="wordmark-last">Meyer</span>
    </a>

    <button type="button" class="navbar-toggler collapsed" data-toggle="collapse" data-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
      <span class="navbar-toggler-icon"></span>
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarCollapse">
      <ul class="nav navbar-nav main-navigation my-0">
        {{ $menu := .Site.Menus.main }}
        {{ range $menu }}
        <li class="nav-item">
          <a href="{{ .URL | relURL }}"
            class="nav-link {{ if $.IsHome }}scroll{{ end }}">{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
      <a href="#"
         data-contact="{{ (.Site.Data.hero.mail) | base64Encode }}"
         onclick="event.preventDefault(); showEmailChallenge(this)"
         class="btn btn-primary nav-cta ms-3">Get in touch</a>
    </div>

  </div>
</nav>

<script>
(function () {
  var toggler = document.querySelector('.navbar-toggler');
  var collapse = document.querySelector('#navbarCollapse');
  if (!toggler || !collapse) return;

  toggler.addEventListener('click', function (e) {
    e.stopPropagation();
    var open = collapse.classList.contains('show');
    if (open) {
      collapse.classList.remove('show');
      toggler.classList.add('collapsed');
      toggler.setAttribute('aria-expanded', 'false');
    } else {
      collapse.classList.add('show');
      toggler.classList.remove('collapsed');
      toggler.setAttribute('aria-expanded', 'true');
    }
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('#mainNav') && collapse.classList.contains('show')) {
      collapse.classList.remove('show');
      toggler.classList.add('collapsed');
      toggler.setAttribute('aria-expanded', 'false');
    }
  });
}());
</script>
